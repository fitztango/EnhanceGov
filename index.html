<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EnhanceGov LLC — Organizational Intelligence & Strategic Advisory</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --navy:      #1B2A5E;
    --navy-dark: #111C42;
    --navy-mid:  #243580;
    --green:     #7FD758;
    --green-dim: #5CB83A;
    --green-pale:#EBF8E4;
    --white:     #FFFFFF;
    --off-white: #F7F8FB;
    --gray-100:  #F0F1F5;
    --gray-300:  #C8CADC;
    --gray-500:  #7A7F9A;
    --gray-700:  #3D4166;
    --text-body: #2C3157;
    --font-display: 'Playfair Display', Georgia, serif;
    --font-body:    'DM Sans', sans-serif;
    --font-mono:    'DM Mono', monospace;
    --radius: 4px;
    --transition: 0.3s cubic-bezier(0.4,0,0.2,1);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    font-family: var(--font-body);
    color: var(--text-body);
    background: var(--white);
    overflow-x: hidden;
    line-height: 1.6;
  }

  /* ── PAGE SYSTEM ─────────────────────────── */
  .page { display: none; animation: fadeIn 0.4s ease; }
  .page.active { display: block; }
  @keyframes fadeIn { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }

  /* ── NAV ─────────────────────────────────── */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 5%;
    height: 112px;
    background: var(--navy-dark);
    border-bottom: 1px solid rgba(127,215,88,0.15);
    transition: var(--transition);
  }
  nav.scrolled {
    height: 84px;
    background: rgba(17,28,66,0.97);
    backdrop-filter: blur(12px);
    box-shadow: 0 4px 30px rgba(0,0,0,0.3);
  }
  .nav-brand {
    display: flex; align-items: center; gap: 16px;
    cursor: pointer; text-decoration: none;
  }
  .nav-logo-mark {
    width: 38px; height: 38px;
    background: var(--green);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-display);
    font-weight: 900; font-size: 18px;
    color: var(--navy-dark);
    flex-shrink: 0;
  }
  .nav-brand-text { display: flex; flex-direction: column; gap: 5px; }
  .nav-brand-name { font-weight: 700; font-size: 20px; color: var(--white); line-height: 1.1; letter-spacing: 0.02em; }
  .nav-brand-sub { font-size: 11px; color: var(--green); letter-spacing: 0.1em; font-family: var(--font-mono); text-transform: uppercase; opacity: 0.9; line-height: 1.4; }
  .nav-links { display: flex; align-items: center; gap: 8px; }
  .nav-links a {
    font-size: 13px; font-weight: 500; color: rgba(255,255,255,0.7);
    cursor: pointer; padding: 8px 12px; border-radius: var(--radius);
    transition: var(--transition); text-decoration: none;
  }
  .nav-links a:hover { color: var(--white); background: rgba(255,255,255,0.06); }
  .nav-links a.active { color: var(--green); }
  .nav-cta {
    background: var(--green) !important; color: var(--navy-dark) !important;
    font-weight: 600 !important; padding: 9px 18px !important;
    border-radius: var(--radius) !important;
  }
  .nav-cta:hover { background: var(--green-dim) !important; }

  /* ── SHARED ──────────────────────────────── */
  .hero-grid-overlay {
    position: absolute; inset: 0;
    background: repeating-linear-gradient(90deg, rgba(127,215,88,0.025) 0px, rgba(127,215,88,0.025) 1px, transparent 1px, transparent 60px),
                repeating-linear-gradient(0deg, rgba(127,215,88,0.025) 0px, rgba(127,215,88,0.025) 1px, transparent 1px, transparent 60px);
    pointer-events: none;
  }
  .hero-bg-circle {
    position: absolute; border-radius: 50%;
    background: radial-gradient(circle, rgba(127,215,88,0.12) 0%, transparent 70%);
    pointer-events: none;
  }
  .hero-bg-circle-1 { width: 600px; height: 600px; top: -200px; right: -100px; }
  .hero-bg-circle-2 { width: 400px; height: 400px; bottom: -100px; left: -50px; }
  .hero-eyebrow {
    font-family: var(--font-mono); font-size: 11px;
    letter-spacing: 0.2em; text-transform: uppercase;
    color: var(--green); margin-bottom: 24px;
    display: flex; align-items: center; gap: 12px;
  }
  .hero-eyebrow::before { content: ''; width: 24px; height: 1px; background: var(--green); }
  .btn-primary {
    display: inline-block;
    background: var(--green); color: var(--navy-dark);
    font-family: var(--font-body); font-size: 14px; font-weight: 600;
    padding: 14px 28px; border-radius: var(--radius);
    border: none; cursor: pointer; transition: var(--transition);
    text-decoration: none;
  }
  .btn-primary:hover { background: var(--green-dim); transform: translateY(-1px); }
  .btn-secondary {
    display: inline-block;
    background: transparent; color: rgba(255,255,255,0.8);
    font-family: var(--font-body); font-size: 14px; font-weight: 500;
    padding: 14px 28px; border-radius: var(--radius);
    border: 1px solid rgba(255,255,255,0.2); cursor: pointer;
    transition: var(--transition); text-decoration: none;
  }
  .btn-secondary:hover { border-color: rgba(255,255,255,0.5); color: var(--white); }
  .section-eyebrow {
    font-family: var(--font-mono); font-size: 11px;
    letter-spacing: 0.2em; text-transform: uppercase;
    color: var(--green); margin-bottom: 16px;
    display: flex; align-items: center; gap: 12px;
  }
  .section-eyebrow::before { content: ''; width: 24px; height: 1px; background: var(--green); }
  .section-title {
    font-family: var(--font-display); font-size: clamp(28px, 4vw, 44px);
    font-weight: 900; color: var(--navy); line-height: 1.15; margin-bottom: 20px;
  }
  .cta-section {
    background: var(--navy-dark); padding: 80px 5%; text-align: center;
  }
  .cta-section h2 {
    font-family: var(--font-display); font-size: clamp(28px, 4vw, 44px);
    font-weight: 900; color: var(--white); margin-bottom: 16px;
  }
  .cta-section p { font-size: 16px; color: rgba(255,255,255,0.6); margin-bottom: 36px; max-width: 560px; margin-left: auto; margin-right: auto; }
  .cta-actions { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; }
  footer {
    background: var(--navy-dark);
    border-top: 1px solid rgba(255,255,255,0.06);
    padding: 40px 5% 28px;
  }
  .footer-inner {
    display: flex; justify-content: space-between; align-items: center;
    flex-wrap: wrap; gap: 20px; margin-bottom: 28px;
  }
  .footer-brand { font-size: 13px; color: rgba(255,255,255,0.5); line-height: 1.6; }
  .footer-brand strong { display: block; color: var(--white); font-size: 15px; margin-bottom: 4px; }
  .footer-links { display: flex; gap: 24px; }
  .footer-links a {
    font-size: 13px; color: rgba(255,255,255,0.5); cursor: pointer;
    transition: var(--transition); text-decoration: none;
  }
  .footer-links a:hover { color: var(--green); }
  .footer-copy { font-size: 12px; color: rgba(255,255,255,0.3); border-top: 1px solid rgba(255,255,255,0.04); padding-top: 20px; }

  /* ── SCROLL REVEAL ───────────────────────── */
  .reveal { opacity: 0; transform: translateY(24px); transition: opacity 0.6s ease, transform 0.6s ease; }
  .reveal.visible { opacity: 1; transform: translateY(0); }

  /* ══════════════════════════════════════════
     INSIGHTS
  ═══════════════════════════════════════════ */
  .insights-hero {
    background: var(--navy-dark); padding: 120px 5% 80px;
    min-height: 50vh; display: flex; align-items: flex-end;
    position: relative; overflow: hidden;
  }
  .insights-hero-content { position: relative; z-index: 2; max-width: 640px; }
  .insights-hero h1 {
    font-family: var(--font-display);
    font-size: clamp(36px, 5vw, 58px);
    font-weight: 900; color: var(--white); line-height: 1.1; margin-bottom: 20px;
  }
  .insights-hero h1 em { color: var(--green); font-style: italic; }
  .insights-hero p { font-size: 16px; color: rgba(255,255,255,0.6); line-height: 1.7; }
  .insights-grid { padding: 80px 5%; background: var(--off-white); }
  .featured-article {
    display: grid; grid-template-columns: 1fr 1fr; gap: 0;
    background: var(--white); border-radius: 8px;
    overflow: hidden; box-shadow: 0 4px 24px rgba(27,42,94,0.1);
    margin-bottom: 48px;
  }
  .featured-article-visual {
    background: var(--navy-dark); padding: 64px 48px;
    display: flex; align-items: center; justify-content: center;
    min-height: 360px; position: relative; overflow: hidden;
  }
  .featured-article-visual::before {
    content: '';
    position: absolute; inset: 0;
    background: repeating-linear-gradient(45deg, rgba(127,215,88,0.03) 0px, rgba(127,215,88,0.03) 1px, transparent 1px, transparent 12px);
  }
  .featured-quote-visual {
    font-family: var(--font-display);
    font-size: clamp(16px, 2vw, 22px);
    color: var(--white); font-style: italic; line-height: 1.5;
    text-align: center; position: relative; z-index: 1;
  }
  .featured-quote-visual em { color: var(--green); font-style: normal; font-weight: 700; }
  .featured-article-body { padding: 56px 48px; display: flex; flex-direction: column; justify-content: center; }
  .article-label { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--green); margin-bottom: 16px; }
  .featured-article-body h2 {
    font-family: var(--font-display); font-size: clamp(22px, 2.5vw, 30px);
    font-weight: 900; color: var(--navy); line-height: 1.25; margin-bottom: 16px;
  }
  .article-meta { font-size: 12px; color: var(--gray-500); font-family: var(--font-mono); margin-bottom: 20px; }
  .featured-article-body p { font-size: 15px; color: var(--gray-500); line-height: 1.8; margin-bottom: 32px; }
  .article-cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; }
  .article-card {
    background: var(--white); border-radius: 6px;
    overflow: hidden; box-shadow: 0 2px 12px rgba(27,42,94,0.06);
    transition: var(--transition);
  }
  .article-card:hover { transform: translateY(-4px); box-shadow: 0 8px 28px rgba(27,42,94,0.12); }
  .article-card-header { background: var(--navy); padding: 40px 28px; min-height: 160px; display: flex; align-items: flex-end; }
  .article-card-tag { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; color: rgba(127,215,88,0.7); }
  .article-card-body { padding: 28px; }
  .article-card-title { font-family: var(--font-display); font-size: 18px; font-weight: 700; color: var(--navy); line-height: 1.35; margin-bottom: 10px; }
  .article-card-excerpt { font-size: 13px; color: var(--gray-500); line-height: 1.6; }
  .article-card-footer { padding: 0 28px 28px; }
  .btn-article {
    font-size: 12px; font-weight: 600; font-family: var(--font-mono);
    letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--navy); cursor: pointer; border: none;
    background: none; padding: 0; transition: var(--transition);
    text-decoration: none; display: inline-block;
  }
  .btn-article:hover { color: var(--green); }
  .btn-article-featured {
    display: inline-flex; align-items: center; gap: 8px;
    font-size: 12px; font-weight: 600; font-family: var(--font-mono);
    letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--navy); cursor: pointer; border: 1px solid var(--gray-300);
    background: none; padding: 12px 20px; border-radius: var(--radius);
    transition: var(--transition); text-decoration: none;
  }
  .btn-article-featured:hover { background: var(--navy); color: var(--white); border-color: var(--navy); }

  @media (max-width: 960px) {
    .featured-article { grid-template-columns: 1fr; }
    .featured-article-visual { min-height: 220px; }
    .article-cards { grid-template-columns: 1fr 1fr; }
  }
  @media (max-width: 640px) {
    .article-cards { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<!-- INSIGHTS PAGE -->
<div id="insights-page" class="page active">
  <!-- Hero -->
  <div class="insights-hero">
    <div class="insights-hero-content">
      <h1>Insights & <em>Strategic Perspectives</em></h1>
      <p>Deep analysis on governance, organizational intelligence, and strategic decision-making for modern leaders.</p>
    </div>
  </div>

  <!-- Insights Grid -->
  <div class="insights-grid">
    <!-- Featured Article -->
    <div id="featured-article-container"></div>

    <!-- Article Cards -->
    <div class="article-cards" id="article-cards-container"></div>
  </div>
</div>

<script>
  // Fetch and render articles from JSON file
  async function loadArticles() {
    try {
      const response = await fetch('./Articles');
      if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
      const articles = await response.json();

      if (!articles || articles.length === 0) {
        console.warn('No articles found in JSON file');
        return;
      }

      // Render featured article (first article)
      const featuredArticle = articles[0];
      renderFeaturedArticle(featuredArticle);

      // Render article cards (remaining articles)
      const remainingArticles = articles.slice(1);
      renderArticleCards(remainingArticles);
    } catch (error) {
      console.error('Error loading articles:', error);
    }
  }

  // Render featured article
  function renderFeaturedArticle(article) {
    const container = document.getElementById('featured-article-container');
    if (!container) return;

    const html = `
      <div class="featured-article">
        <div class="featured-article-visual">
          <div class="featured-quote-visual">"${article.title}"</div>
        </div>
        <div class="featured-article-body">
          <div class="article-label">${article.tag || 'Featured'}</div>
          <h2>${article.title}</h2>
          <div class="article-meta">${article.source} — ${article.date}</div>
          <p>Explore our latest insights on governance and strategic planning.</p>
          <a href="${article.url}" target="_blank" rel="noopener noreferrer" class="btn-article-featured">
            Read Article →
          </a>
        </div>
      </div>
    `;
    container.innerHTML = html;
  }

  // Render article cards
  function renderArticleCards(articles) {
    const container = document.getElementById('article-cards-container');
    if (!container) return;

    const html = articles.map(article => `
      <div class="article-card">
        <div class="article-card-header">
          <div class="article-card-tag">${article.tag || 'Insights'}</div>
        </div>
        <div class="article-card-body">
          <h3 class="article-card-title">${article.title}</h3>
          <p class="article-card-excerpt">${article.source} • ${article.date}</p>
        </div>
        <div class="article-card-footer">
          <a href="${article.url}" target="_blank" rel="noopener noreferrer" class="btn-article">
            Read More →
          </a>
        </div>
      </div>
    `).join('');

    container.innerHTML = html;
  }

  // Load articles when page loads
  document.addEventListener('DOMContentLoaded', loadArticles);
</script>

</body>
</html>
